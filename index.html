
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Byz Creator - Gestão de Contratos</title>
    <meta name="theme-color" content="#0A1E29">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A1E29;
            color: #FFFFFF;
            -webkit-print-color-adjust: exact;
        }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background-color: white !important; color: black !important; }
            .contract-container { shadow: none !important; border: none !important; margin: 0 !important; width: 100% !important; max-width: none !important; }
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #00E6A8;
            border-radius: 10px;
        }
        .touch-none {
            touch-action: none;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            green: '#00E6A8',
                            blue: '#00CFFF',
                            white: '#FFFFFF',
                            dark: '#0A1E29',
                        }
                    },
                    screens: {
                      'xs': '475px',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/src/index.tsx"></script>
</body>
</html>
